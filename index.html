<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zorii</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-bg: #0a0a1a;
            --violet: #7c3aed;
            --violet-light: #a78bfa;
            --blue: #3b82f6;
            --off-white: #f8fafc;
            --card-bg: rgba(26, 26, 46, 0.2);
            --border-color: rgba(167, 139, 250, 0.3);
            --text-muted: #94a3b8;
            --gradient: linear-gradient(135deg, var(--violet), var(--blue));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--off-white);
            overflow: hidden;
            position: relative;
            min-height: 100vh; /* Ensure body takes full height for centering pages */
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.3), transparent 70%);
            filter: blur(100px);
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2), transparent 70%);
            filter: blur(100px);
            z-index: 0;
        }

        .hidden {
            display: none !important;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Buttons and Inputs */
        .btn {
            background: var(--gradient);
            color: var(--off-white);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }
        
        .input-field {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--off-white);
            font-size: 1rem;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--violet-light);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }
        ::-webkit-scrollbar-thumb {
            background-color: var(--violet);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--violet-light);
        }

        /* --- Login Page --- */
        #login-page {
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensure login page content is vertically centered */
        }

        .auth-form.hidden {
            display: none;
        }

        .auth-toggle {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--violet-light);
            text-decoration: none;
            cursor: pointer;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .login-card {
            width: 100%; /* Make it take full width up to max-width */
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .login-card h1 {
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .gradient-text {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        /* --- Hub Page --- */
        .hub-navbar {
            position: sticky;
            top: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: rgba(10, 10, 26, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .user-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background-color: #4ade80;
            border-radius: 50%;
        }

        #hub-page .container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            flex-grow: 1; /* Allow container to take available space */
            overflow-y: auto; /* Allow scrolling within the hub content */
            padding-top: 2rem; /* Give space below navbar */
            padding-bottom: 2rem; /* Give space at the bottom */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }
        
        .create-room-form {
            display: flex;
            flex-wrap: wrap; /* Allow items to wrap on small screens */
            gap: 1rem;
        }

        .create-room-form .input-field {
            flex-grow: 1;
            min-width: 150px; /* Ensure input doesn't get too small */
        }
        .create-room-form .btn {
            flex-shrink: 0; /* Prevent button from shrinking */
        }
        
        .hub-section {
            margin-top: 2rem;
        }

        .room-list-container {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        #search-rooms-form {
            margin-top: 1rem;
        }

        /* --- Room Page --- */
        #room-page {
            height: 100vh;
        }
        
        .room-header {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(10, 10, 26, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            z-index: 5;
        }

        .room-header .back-btn {
            background: none; border: none; color: var(--off-white); font-size: 1.5rem; cursor: pointer;
        }

        .avatar-group { display: flex; }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--dark-bg); margin-left: -10px;
        }
        .avatar:first-child { margin-left: 0; }

        #messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        .message {
            display: flex;
            max-width: 75%;
            width: fit-content;
        }

        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
        }

        .message-sender {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--violet-light);
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.sent .message-bubble {
            background: var(--gradient);
            border-top-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #21213a;
            border-top-left-radius: 4px;
        }
        
        .message-form-container {
            padding: 1rem;
            background: rgba(10, 10, 26, 0.5);
            border-top: 1px solid var(--border-color);
        }
        
        #message-form {
            display: flex;
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
        }
        #message-form .input-field {
            flex-grow: 1;
        }

        /* ================= MEDIA QUERIES ================= */
        @media (max-width: 768px) {
            .container {
                padding: 1rem; /* Reduce padding on smaller screens */
            }
            .hub-navbar, .room-header {
                padding: 1rem; /* Reduce padding */
            }
            #messages-container {
                padding: 1rem; /* Reduce padding */
            }
            .login-card {
                padding: 2rem 1.5rem; /* Adjust login card padding */
                margin: 0 1rem; /* Add horizontal margin to prevent touching edges */
            }
            .login-card h1 {
                font-size: 2rem; /* Smaller font for title */
            }
            .room-list-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* Allow smaller cards */
            }
        }

        @media (max-width: 480px) {
            .login-card h1 {
                font-size: 1.8rem;
            }
            .hub-navbar .btn {
                padding: 6px 12px; /* Smaller logout button */
            }
            .hub-navbar .logo, .user-display {
                font-size: 1.2rem; /* Smaller text for navbar */
            }
            .room-list-container {
                grid-template-columns: 1fr; /* Single column on very small screens */
            }
            .create-room-form {
                flex-direction: column; /* Stack input and button */
            }
            .create-room-form .btn {
                width: 100%; /* Make button full width */
            }
            .room-header {
                flex-wrap: wrap; /* Allow header items to wrap */
                justify-content: center; /* Center items if wrapped */
                text-align: center;
            }
            .room-header h2 {
                width: 100%; /* Room name takes full width */
            }
            .avatar-group {
                margin-top: 0.5rem; /* Space if avatars wrap */
            }
            .message {
                max-width: 90%; /* Messages take more width on small screens */
            }
        }

    </style>
</head>
<body>

    <!-- ======== LOGIN PAGE ======== -->
    <div id="login-page" class="page">
        <div class="login-card glass-card">
            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <h1>Connexion à <span class="gradient-text">Zorii</span></h1>
                <input type="email" id="login-email" class="input-field" placeholder="Email..." required autocomplete="email">
                <input type="password" id="login-password" class="input-field" placeholder="Mot de passe..." required autocomplete="current-password">
                <button type="submit" class="btn">Se Connecter</button>
                <p class="auth-toggle">Pas encore de compte ? <a href="#" id="show-signup">Inscrivez-vous</a></p>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form hidden">
                <h1>Créer un compte</h1>
                <input type="text" id="signup-name" class="input-field" placeholder="Nom d'utilisateur..." required autocomplete="nickname">
                <input type="email" id="signup-email" class="input-field" placeholder="Email..." required autocomplete="email">
                <input type="password" id="signup-password" class="input-field" placeholder="Mot de passe (min. 6 caractères)..." required autocomplete="new-password">
                <button type="submit" class="btn">S'inscrire</button>
                <p class="auth-toggle">Déjà un compte ? <a href="#" id="show-login">Connectez-vous</a></p>
            </form>
        </div>
    </div>

    <!-- ======== HUB PAGE ======== -->
    <div id="hub-page" class="page hidden">
        <nav class="hub-navbar">
            <div class="logo">
                <span class="gradient-text">Z</span>orii
            </div>
            <div class="user-display">
                <span class="online-dot"></span>
                <span id="hub-username"></span>
            </div>
            <button id="logout-btn" class="btn" style="padding: 8px 16px;">Déconnexion</button>
        </nav>
        <main class="container">
            <div class="hub-section">
                <h2>Créer une Room</h2>
                <form id="create-room-form" class="create-room-form">
                    <input type="text" id="new-room-name" class="input-field" placeholder="Nom de la nouvelle room..." required>
                    <button type="submit" class="btn">Créer</button>
                </form>
            </div>

            <div class="hub-section">
                <h2>Mes Communautés</h2>
                <div id="my-rooms-list" class="room-list-container">
                    <!-- Joined rooms will be injected by JS -->
                </div>
            </div>

            <div class="hub-section">
                <h2>Découvrir</h2>
                <form id="search-rooms-form">
                    <input type="search" id="search-rooms-input" class="input-field" placeholder="Rechercher une room...">
                </form>
                <div id="search-results-list" class="room-list-container">
                     <!-- Search results will be injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- ======== ROOM PAGE ======== -->
    <div id="room-page" class="page hidden">
        <header class="room-header">
            <button class="back-btn" id="back-to-hub-btn">&larr;</button>
            <div>
                <h2 id="room-name-header"></h2>
                <span id="room-members-header" style="color: var(--text-muted); font-size: 0.9rem;"></span>
            </div>
            <div class="avatar-group" id="room-avatars">
                <!-- Avatars will be injected by JS -->
            </div>
        </header>

        <main id="messages-container">
            <!-- Messages will be injected by JS -->
        </main>

        <footer class="message-form-container">
            <form id="message-form">
                <input type="text" id="message-input" class="input-field" placeholder="Écrivez votre message..." autocomplete="off">
                <button type="submit" class="btn">Envoyer</button>
            </form>
        </footer>
    </div>


    <script type="module">
        // ================= FIREBASE SDKS =================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut, 
            updateProfile 
        } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            orderBy, 
            query, 
            serverTimestamp,
            doc,
            setDoc,
            getDoc,
            getDocs,
            updateDoc,
            arrayUnion,
            where,
            documentId
        } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // ================= FIREBASE CONFIG =================
        const firebaseConfig = {
            apiKey: "AIzaSyDaWhU68yjghUgm8HBlbs9Ngj3ii46jthE",
            authDomain: "zorii-c1a38.firebaseapp.com",
            projectId: "zorii-c1a38",
            storageBucket: "zorii-c1a38.firebasestorage.app",
            messagingSenderId: "576444699642",
            appId: "1:576444699642:web:1fcf66eb88a06e181d8a43",
            measurementId: "G-C2M2LJRZTG"
        };

        // ================= INITIALIZATION =================
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ================= STATE =================
        let currentUser = null;
        let currentRoomId = null;
        let myRoomsUnsubscribe = () => {};
        let messagesUnsubscribe = () => {};

        // ================= DOM ELEMENTS =================
        const pages = {
            login: document.getElementById('login-page'),
            hub: document.getElementById('hub-page'),
            room: document.getElementById('room-page'),
        };

        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const showSignupBtn = document.getElementById('show-signup');
        const showLoginBtn = document.getElementById('show-login');

        const hubUsername = document.getElementById('hub-username');
        const logoutBtn = document.getElementById('logout-btn');
        const createRoomForm = document.getElementById('create-room-form');
        const newRoomNameInput = document.getElementById('new-room-name');
        
        const myRoomsList = document.getElementById('my-rooms-list');
        const searchRoomsForm = document.getElementById('search-rooms-form');
        const searchRoomsInput = document.getElementById('search-rooms-input');
        const searchResultsList = document.getElementById('search-results-list');

        const backToHubBtn = document.getElementById('back-to-hub-btn');
        const roomNameHeader = document.getElementById('room-name-header');
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');


        // ================= FUNCTIONS =================

        const showPage = (pageName) => {
            Object.values(pages).forEach(page => page.classList.add('hidden'));
            if (pages[pageName]) pages[pageName].classList.remove('hidden');
        };

        // --- Auth & User Profile ---
        const handleSignUp = async (e) => {
            e.preventDefault();
            const name = signupForm['signup-name'].value.trim();
            const email = signupForm['signup-email'].value.trim();
            const password = signupForm['signup-password'].value;

            if (name.length < 2 || password.length < 6) {
                alert("Le nom d'utilisateur doit faire au moins 2 caractères et le mot de passe au moins 6.");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                // Create a document for the user in the 'users' collection
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    displayName: name,
                    email: email,
                    joinedRooms: []
                });
            } catch (error) {
                alert(`Erreur d'inscription: ${error.message}`);
            }
        };

        const handleLogin = (e) => {
            e.preventDefault();
            const email = loginForm['login-email'].value;
            const password = loginForm['login-password'].value;
            signInWithEmailAndPassword(auth, email, password).catch(error => alert(`Erreur de connexion: ${error.message}`));
        };

        const handleLogout = () => signOut(auth);

        // --- Room Management ---
        const renderRoomCard = (room, container, isJoined) => {
            const card = document.createElement('div');
            card.className = 'room-card glass-card';
            const buttonHtml = isJoined 
                ? `<button class="btn open-room-btn" data-room-id="${room.id}">Ouvrir</button>`
                : `<button class="btn join-room-btn" data-room-id="${room.id}">Rejoindre</button>`;

            card.innerHTML = `
                <h3>${room.name}</h3>
                <p class="last-message">${isJoined ? 'Vous êtes membre' : 'Découvrir'}</p>
                ${buttonHtml}
            `;
            container.appendChild(card);
        };

        const listenForMyRooms = (user) => {
            myRoomsUnsubscribe(); // Unsubscribe from previous listener
            myRoomsUnsubscribe = onSnapshot(doc(db, "users", user.uid), async (userDoc) => {
                myRoomsList.innerHTML = '<p>Vous n\'avez rejoint aucune communauté.</p>';
                const userData = userDoc.data();
                if (userData && userData.joinedRooms && userData.joinedRooms.length > 0) {
                    myRoomsList.innerHTML = '';
                    const roomIds = userData.joinedRooms;
                    // Fetch details for each room. Firestore 'in' query is limited to 10 items.
                    // For more, you'd fetch them individually.
                    const roomsQuery = query(collection(db, "rooms"), where(documentId(), "in", roomIds));
                    const querySnapshot = await getDocs(roomsQuery);
                    querySnapshot.forEach((roomDoc) => {
                        renderRoomCard({ id: roomDoc.id, ...roomDoc.data() }, myRoomsList, true);
                    });
                }
            });
        };

        const handleSearchRooms = async (e) => {
            e.preventDefault();
            const searchTerm = searchRoomsInput.value.trim().toLowerCase();
            searchResultsList.innerHTML = '';
            if (searchTerm.length < 2) return;

            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            const myRoomIds = userDoc.data()?.joinedRooms || [];

            // A simple search. For real full-text search, use a third-party service like Algolia.
            const allRoomsQuery = query(collection(db, "rooms"), where('name', '>=', searchTerm), where('name', '<=', searchTerm + '\uf8ff'));
            const querySnapshot = await getDocs(allRoomsQuery);
            
            let resultCount = 0;
            querySnapshot.forEach((roomDoc) => {
                // Don't show rooms the user has already joined
                if (!myRoomIds.includes(roomDoc.id)) {
                    renderRoomCard({ id: roomDoc.id, ...roomDoc.data() }, searchResultsList, false);
                    resultCount++;
                }
            });

            if(resultCount === 0) {
                searchResultsList.innerHTML = '<p>Aucune nouvelle room trouvée.</p>';
            }
        };

        const addUserToRoom = async (roomId) => {
            if (!currentUser) return;
            const userDocRef = doc(db, "users", currentUser.uid);
            await updateDoc(userDocRef, {
                joinedRooms: arrayUnion(roomId)
            });
        };

        const handleCreateRoom = async (e) => {
            e.preventDefault();
            const roomName = newRoomNameInput.value.trim();
            if (!roomName || !currentUser) return;

            try {
                const newRoomRef = await addDoc(collection(db, 'rooms'), {
                    name: roomName,
                    creatorId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
                newRoomNameInput.value = '';
                await addUserToRoom(newRoomRef.id);
                navigateToRoom(newRoomRef.id, roomName);
            } catch (error) {
                alert(`Erreur de création de room: ${error.message}`);
            }
        };

        const navigateToRoom = (roomId, roomName) => {
            currentRoomId = roomId;
            roomNameHeader.textContent = roomName;
            listenForMessages(roomId);
            showPage('room');
        };

        const listenForMessages = (roomId) => {
            messagesUnsubscribe(); // Unsubscribe from previous room
            const messagesQuery = query(collection(db, 'rooms', roomId, 'messages'), orderBy('timestamp', 'asc'));
            messagesUnsubscribe = onSnapshot(messagesQuery, snapshot => {
                messagesContainer.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    appendMessage(msg.userName, msg.text, msg.userId);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        };

        const appendMessage = (userName, text, userId) => {
            const messageEl = document.createElement('div');
            const isSent = userId === currentUser.uid;
            messageEl.className = `message ${isSent ? 'sent' : 'received'}`;

            messageEl.innerHTML = `
                <div class="message-bubble">
                    ${!isSent ? `<div class="message-sender">${userName}</div>` : ''}
                    <div class="message-text">${text}</div>
                </div>`;
            messagesContainer.appendChild(messageEl);
        };

        const handleSendMessage = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentRoomId || !currentUser) return;
            
            try {
                await addDoc(collection(db, 'rooms', currentRoomId, 'messages'), {
                    text: text,
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    timestamp: serverTimestamp()
                });
                messageInput.value = '';
            } catch (error) {
                alert(`Erreur d'envoi: ${error.message}`);
            }
        };

        // --- Auth State Observer ---
        onAuthStateChanged(auth, user => {
            myRoomsUnsubscribe();
            messagesUnsubscribe();
            if (user) {
                currentUser = user;
                hubUsername.textContent = user.displayName || user.email;
                listenForMyRooms(user);
                showPage('hub');
            } else {
                currentUser = null;
                showPage('login');
            }
        });

        // ================= EVENT LISTENERS =================
        loginForm.addEventListener('submit', handleLogin);
        signupForm.addEventListener('submit', handleSignUp);
        showSignupBtn.addEventListener('click', (e) => { e.preventDefault(); loginForm.classList.add('hidden'); signupForm.classList.remove('hidden'); });
        showLoginBtn.addEventListener('click', (e) => { e.preventDefault(); signupForm.classList.add('hidden'); loginForm.classList.remove('hidden'); });
        logoutBtn.addEventListener('click', handleLogout);

        createRoomForm.addEventListener('submit', handleCreateRoom);
        searchRoomsForm.addEventListener('submit', handleSearchRooms);
        
        myRoomsList.addEventListener('click', (e) => {
            const openBtn = e.target.closest('.open-room-btn');
            if (openBtn) {
                const roomName = openBtn.parentElement.querySelector('h3').textContent;
                navigateToRoom(openBtn.dataset.roomId, roomName);
            }
        });

        searchResultsList.addEventListener('click', (e) => {
            const joinBtn = e.target.closest('.join-room-btn');
            if (joinBtn) {
                addUserToRoom(joinBtn.dataset.roomId);
                joinBtn.textContent = 'Rejoint !';
                joinBtn.disabled = true;
            }
        });
        
        backToHubBtn.addEventListener('click', () => {
            messagesUnsubscribe();
            currentRoomId = null;
            showPage('hub');
        });
        messageForm.addEventListener('submit', handleSendMessage);
    </script>

</body>
</html>
