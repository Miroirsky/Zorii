<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zorii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --night: #0a0a1a;
      --violet: #7c3aed;
      --violet-soft: #a78bfa;
      --blue: #3b82f6;
      --white: #f8fafc;
      --muted: #b9c2d9;
      --panel: rgba(248, 250, 252, 0.08);
      --panel-strong: rgba(248, 250, 252, 0.13);
      --line: rgba(167, 139, 250, 0.25);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      --accent: linear-gradient(135deg, #7c3aed, #3b82f6);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scrollbar-width: thin;
      scrollbar-color: var(--violet) rgba(248, 250, 252, 0.08);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--white);
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(124, 58, 237, 0.36), transparent 28rem),
        radial-gradient(circle at 86% 22%, rgba(59, 130, 246, 0.3), transparent 30rem),
        radial-gradient(circle at 44% 96%, rgba(167, 139, 250, 0.18), transparent 34rem),
        var(--night);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(248, 250, 252, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(248, 250, 252, 0.035) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.68), transparent 88%);
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(248, 250, 252, 0.08);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--violet), var(--blue));
      border: 2px solid rgba(10, 10, 26, 0.86);
      border-radius: 999px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 24px;
    }

    .screen.active {
      display: block;
    }

    .login-screen.active {
      display: grid;
      place-items: center;
    }

    .glass {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(248, 250, 252, 0.12), rgba(248, 250, 252, 0.055));
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .login-card {
      width: min(440px, 100%);
      padding: 36px;
      border-radius: 8px;
    }

    .brand-mark {
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border-radius: 8px;
      color: white;
      font-size: 2rem;
      font-weight: 800;
      background: var(--accent);
      box-shadow: 0 16px 34px rgba(124, 58, 237, 0.36);
    }

    .login-card h1 {
      margin: 22px 0 10px;
      font-size: clamp(2.3rem, 9vw, 4rem);
      line-height: 0.94;
      letter-spacing: 0;
      background: var(--accent);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .login-card p {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    label {
      color: var(--white);
      font-size: 0.92rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 50px;
      border: 1px solid rgba(167, 139, 250, 0.34);
      border-radius: 8px;
      outline: none;
      color: var(--white);
      background: rgba(10, 10, 26, 0.62);
      padding: 0 15px;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    input::placeholder {
      color: rgba(248, 250, 252, 0.42);
    }

    input:focus {
      border-color: rgba(167, 139, 250, 0.85);
      background: rgba(10, 10, 26, 0.78);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.18);
    }

    .btn {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 8px;
      color: white;
      font-weight: 800;
      background: var(--accent);
      box-shadow: 0 14px 28px rgba(59, 130, 246, 0.22);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(124, 58, 237, 0.32);
      filter: brightness(1.04);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.secondary {
      color: var(--white);
      background: rgba(248, 250, 252, 0.1);
      box-shadow: none;
      border: 1px solid rgba(167, 139, 250, 0.22);
    }

    .login-btn {
      width: 100%;
      margin-top: 18px;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .error {
      min-height: 20px;
      margin: 12px 0 0;
      color: #fecaca;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .status {
      min-height: 20px;
      margin: 12px 0 0;
      color: var(--violet-soft);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: -24px -24px 28px;
      padding: 16px clamp(18px, 4vw, 42px);
      border-bottom: 1px solid rgba(167, 139, 250, 0.2);
      background: rgba(10, 10, 26, 0.76);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .brand {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 12px;
    }

    .brand .brand-mark {
      width: 42px;
      height: 42px;
      font-size: 1.35rem;
      flex: 0 0 auto;
    }

    .brand-name {
      font-size: 1.45rem;
      font-weight: 800;
      background: var(--accent);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
      padding: 0 13px;
      border: 1px solid rgba(167, 139, 250, 0.22);
      border-radius: 8px;
      color: var(--white);
      background: rgba(248, 250, 252, 0.08);
      font-weight: 700;
    }

    .online-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.12);
    }

    .nav-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .layout {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .hub-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 18px;
      margin-bottom: 22px;
    }

    .panel {
      border-radius: 8px;
      padding: 22px;
    }

    .panel h2,
    .panel h3 {
      margin: 0;
    }

    .panel p {
      color: var(--muted);
      line-height: 1.6;
    }

    .title-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .title-row h2 {
      font-size: clamp(1.65rem, 4vw, 2.5rem);
      letter-spacing: 0;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .stat {
      min-height: 86px;
      border: 1px solid rgba(167, 139, 250, 0.18);
      border-radius: 8px;
      padding: 14px;
      background: rgba(10, 10, 26, 0.34);
    }

    .stat strong {
      display: block;
      font-size: 1.5rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .create-room {
      display: grid;
      gap: 12px;
      align-self: stretch;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .room-card {
      display: grid;
      gap: 14px;
      border: 1px solid rgba(167, 139, 250, 0.21);
      border-radius: 8px;
      padding: 18px;
      background: rgba(248, 250, 252, 0.075);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .room-card:hover {
      transform: translateY(-3px);
      border-color: rgba(167, 139, 250, 0.48);
      background: rgba(248, 250, 252, 0.11);
    }

    .room-main {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .room-main h3 {
      overflow-wrap: anywhere;
      font-size: 1.12rem;
    }

    .members {
      color: var(--violet-soft);
      white-space: nowrap;
      font-weight: 800;
    }

    .preview {
      min-height: 48px;
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .room-card .btn {
      width: 100%;
    }

    .room-screen.active {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .chat-shell {
      display: grid;
      width: min(1040px, 100%);
      min-height: calc(100vh - 124px);
      margin: 0 auto;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      border-radius: 8px;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(167, 139, 250, 0.2);
    }

    .room-meta h2 {
      margin: 0 0 6px;
      overflow-wrap: anywhere;
      font-size: 1.45rem;
    }

    .room-meta span {
      color: var(--muted);
      font-weight: 600;
    }

    .avatar-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-left: 10px;
    }

    .avatar {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      margin-left: -8px;
      border: 2px solid rgba(10, 10, 26, 0.84);
      border-radius: 999px;
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      background: var(--accent);
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 22px;
      scroll-behavior: smooth;
    }

    .message {
      display: grid;
      max-width: min(72%, 560px);
      gap: 5px;
      animation: rise 220ms ease both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.mine {
      align-self: flex-end;
      justify-items: end;
    }

    .message.theirs {
      align-self: flex-start;
    }

    .author {
      color: rgba(248, 250, 252, 0.62);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .bubble {
      border: 1px solid rgba(167, 139, 250, 0.18);
      border-radius: 8px;
      padding: 11px 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .mine .bubble {
      color: white;
      background: var(--accent);
      box-shadow: 0 14px 26px rgba(59, 130, 246, 0.2);
    }

    .theirs .bubble {
      color: var(--white);
      background: rgba(10, 10, 26, 0.62);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid rgba(167, 139, 250, 0.2);
      background: rgba(10, 10, 26, 0.38);
    }

    .empty-state {
      display: grid;
      min-height: 180px;
      place-items: center;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 780px) {
      .screen {
        padding: 16px;
      }

      .topbar {
        margin: -16px -16px 18px;
        padding: 13px 16px;
      }

      .brand-name {
        font-size: 1.2rem;
      }

      .hub-hero,
      .room-grid {
        grid-template-columns: 1fr;
      }

      .stat-grid {
        grid-template-columns: 1fr;
      }

      .chat-shell {
        min-height: calc(100vh - 104px);
      }

      .chat-header,
      .composer {
        grid-template-columns: 1fr;
      }

      .message {
        max-width: 88%;
      }
    }

    @media (max-width: 560px) {
      .login-card,
      .panel {
        padding: 20px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-actions {
        width: 100%;
      }

      .user-pill,
      .nav-actions .btn {
        flex: 1 1 auto;
      }

      .chat-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .avatar-row {
        justify-content: flex-start;
        padding-left: 8px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .composer .btn {
        width: 100%;
      }

      .auth-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="loginScreen" class="screen login-screen active" aria-label="Connexion">
      <form id="loginForm" class="login-card glass">
        <div class="brand-mark" aria-hidden="true">Z</div>
        <h1>Zorii</h1>
        <p>Connecte ton compte, retrouve tes rooms et discute en direct avec la communaute Zorii.</p>
        <div class="field">
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" autocomplete="email" placeholder="toi@zorii.app" required>
        </div>
        <div class="field">
          <label for="passwordInput">Mot de passe</label>
          <input id="passwordInput" type="password" autocomplete="current-password" minlength="6" placeholder="6 caracteres minimum" required>
        </div>
        <div class="field">
          <label for="usernameInput">Pseudo</label>
          <input id="usernameInput" type="text" autocomplete="nickname" minlength="2" maxlength="22" placeholder="Ex. Nova">
        </div>
        <div class="auth-actions">
          <button id="signinBtn" class="btn" type="submit">Connexion</button>
          <button id="signupBtn" class="btn secondary" type="button">Creer</button>
        </div>
        <p id="loginError" class="error" aria-live="polite"></p>
        <p id="authStatus" class="status" aria-live="polite"></p>
      </form>
    </section>

    <section id="hubScreen" class="screen" aria-label="Hub Zorii">
      <nav class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">Z</div>
          <div class="brand-name">Zorii</div>
        </div>
        <div class="nav-actions">
          <div class="user-pill"><span class="online-dot" aria-hidden="true"></span><span id="currentUser"></span></div>
          <button id="logoutBtn" class="btn secondary" type="button">Déconnexion</button>
        </div>
      </nav>

      <div class="layout">
        <section class="hub-hero">
          <div class="panel glass">
            <div class="title-row">
              <h2>Rooms actives</h2>
            </div>
            <p>Choisis une room pour rejoindre la discussion ou lance une nouvelle conversation avec ton propre salon.</p>
            <div class="stat-grid">
              <div class="stat"><strong id="roomCount">0</strong><span>rooms</span></div>
              <div class="stat"><strong id="memberCount">0</strong><span>membres</span></div>
              <div class="stat"><strong id="messageCount">0</strong><span>messages</span></div>
            </div>
          </div>

          <form id="createRoomForm" class="panel glass create-room">
            <h3>Créer une room</h3>
            <div class="field">
              <label for="roomNameInput">Nom</label>
              <input id="roomNameInput" type="text" minlength="2" maxlength="28" placeholder="Ex. Design nocturne">
            </div>
            <button class="btn" type="submit">Créer</button>
            <p id="roomError" class="error" aria-live="polite"></p>
          </form>
        </section>

        <section id="roomsList" class="room-grid" aria-live="polite"></section>
      </div>
    </section>

    <section id="roomScreen" class="screen room-screen" aria-label="Room de discussion">
      <nav class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">Z</div>
          <div class="brand-name">Zorii</div>
        </div>
        <div class="nav-actions">
          <button id="backBtn" class="btn secondary" type="button">Hub</button>
          <button id="logoutBtnRoom" class="btn secondary" type="button">Déconnexion</button>
        </div>
      </nav>

      <section class="chat-shell glass">
        <header class="chat-header">
          <div class="room-meta">
            <h2 id="roomTitle"></h2>
            <span id="roomMembers"></span>
          </div>
          <div id="avatarRow" class="avatar-row" aria-label="Membres actifs"></div>
        </header>

        <div id="messagesList" class="messages"></div>

        <form id="messageForm" class="composer">
          <input id="messageInput" type="text" maxlength="240" placeholder="Écrire un message..." autocomplete="off">
          <button class="btn" type="submit">Envoyer</button>
        </form>
      </section>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      addDoc,
      collection,
      doc,
      getDoc,
      getDocs,
      increment,
      limit,
      onSnapshot,
      orderBy,
      query,
      serverTimestamp,
      setDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDaWhU68yjghUgm8HBlbs9Ngj3ii46jthE",
      authDomain: "zorii-c1a38.firebaseapp.com",
      projectId: "zorii-c1a38",
      storageBucket: "zorii-c1a38.firebasestorage.app",
      messagingSenderId: "576444699642",
      appId: "1:576444699642:web:1fcf66eb88a06e181d8a43",
      measurementId: "G-C2M2LJRZTG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    analyticsSupported().then((supported) => {
      if (supported) getAnalytics(app);
    }).catch(() => {});

    const people = ["Mira", "Sacha", "Eli", "Noor", "Lio", "Iris", "Kyan", "Ava"];
    const palette = ["#7c3aed", "#3b82f6", "#a78bfa", "#2563eb", "#8b5cf6", "#06b6d4"];
    const seedRooms = [
      { name: "Lounge Violet", members: 18, author: "Mira", text: "Bienvenue dans le salon principal." },
      { name: "Createurs", members: 11, author: "Noor", text: "Je partage des idees de visuels ce soir." },
      { name: "Tech & Cafe", members: 24, author: "Lio", text: "Vanilla JS, propre et rapide." },
      { name: "After Dark", members: 9, author: "Kyan", text: "Ambiance nocturne activee." }
    ];

    const state = {
      user: null,
      username: "",
      rooms: [],
      messages: []
    };

    let activeRoomId = null;
    let pendingUsername = "";
    let unsubscribeRooms = null;
    let unsubscribeMessages = null;

    const loginScreen = document.querySelector("#loginScreen");
    const hubScreen = document.querySelector("#hubScreen");
    const roomScreen = document.querySelector("#roomScreen");
    const loginForm = document.querySelector("#loginForm");
    const emailInput = document.querySelector("#emailInput");
    const passwordInput = document.querySelector("#passwordInput");
    const usernameInput = document.querySelector("#usernameInput");
    const signinBtn = document.querySelector("#signinBtn");
    const signupBtn = document.querySelector("#signupBtn");
    const loginError = document.querySelector("#loginError");
    const authStatus = document.querySelector("#authStatus");
    const currentUser = document.querySelector("#currentUser");
    const logoutBtn = document.querySelector("#logoutBtn");
    const logoutBtnRoom = document.querySelector("#logoutBtnRoom");
    const createRoomForm = document.querySelector("#createRoomForm");
    const roomNameInput = document.querySelector("#roomNameInput");
    const roomError = document.querySelector("#roomError");
    const roomsList = document.querySelector("#roomsList");
    const roomCount = document.querySelector("#roomCount");
    const memberCount = document.querySelector("#memberCount");
    const messageCount = document.querySelector("#messageCount");
    const backBtn = document.querySelector("#backBtn");
    const roomTitle = document.querySelector("#roomTitle");
    const roomMembers = document.querySelector("#roomMembers");
    const avatarRow = document.querySelector("#avatarRow");
    const messagesList = document.querySelector("#messagesList");
    const messageForm = document.querySelector("#messageForm");
    const messageInput = document.querySelector("#messageInput");

    function showScreen(screen) {
      [loginScreen, hubScreen, roomScreen].forEach((item) => item.classList.remove("active"));
      screen.classList.add("active");
    }

    function setBusy(isBusy, label = "") {
      signinBtn.disabled = isBusy;
      signupBtn.disabled = isBusy;
      authStatus.textContent = label;
    }

    function getRoom(id) {
      return state.rooms.find((room) => room.id === id);
    }

    function roomPreview(room) {
      if (room.lastMessageText) return `${room.lastMessageAuthor || "Zorii"}: ${room.lastMessageText}`;
      return "Aucun message pour le moment.";
    }

    function renderHub() {
      currentUser.textContent = state.username || state.user?.email || "";
      roomCount.textContent = state.rooms.length;
      memberCount.textContent = state.rooms.reduce((sum, room) => sum + Number(room.members || 0), 0);
      messageCount.textContent = state.rooms.reduce((sum, room) => sum + Number(room.messageCount || 0), 0);
      roomsList.innerHTML = "";

      if (!state.rooms.length) {
        roomsList.innerHTML = '<div class="empty-state glass">Chargement des rooms...</div>';
        return;
      }

      state.rooms.forEach((room) => {
        const card = document.createElement("article");
        card.className = "room-card";
        card.innerHTML = `
          <div class="room-main">
            <h3>${escapeHTML(room.name)}</h3>
            <span class="members">${Number(room.members || 0)} membres</span>
          </div>
          <p class="preview">${escapeHTML(roomPreview(room))}</p>
          <button class="btn" type="button">Rejoindre</button>
        `;
        card.querySelector("button").addEventListener("click", () => openRoom(room.id));
        roomsList.appendChild(card);
      });
    }

    function renderRoom() {
      const room = getRoom(activeRoomId);
      if (!room) {
        if (state.rooms.length) showScreen(hubScreen);
        return;
      }

      roomTitle.textContent = room.name;
      roomMembers.textContent = `${Number(room.members || 0)} membres connectes`;
      avatarRow.innerHTML = "";
      people.slice(0, 5).forEach((name, index) => {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.style.background = `linear-gradient(135deg, ${palette[index]}, ${palette[(index + 2) % palette.length]})`;
        avatar.textContent = name[0];
        avatar.title = name;
        avatarRow.appendChild(avatar);
      });

      messagesList.innerHTML = "";
      if (!state.messages.length) {
        messagesList.innerHTML = '<div class="empty-state">La room attend son premier message.</div>';
      } else {
        state.messages.forEach((message) => {
          const mine = message.uid === state.user?.uid;
          const item = document.createElement("div");
          item.className = `message ${mine ? "mine" : "theirs"}`;
          item.innerHTML = `
            <span class="author">${escapeHTML(message.author || "Anonyme")}</span>
            <div class="bubble">${escapeHTML(message.text)}</div>
          `;
          messagesList.appendChild(item);
        });
      }

      requestAnimationFrame(() => {
        messagesList.scrollTop = messagesList.scrollHeight;
      });
    }

    function subscribeRooms() {
      if (unsubscribeRooms) unsubscribeRooms();
      const roomsQuery = query(collection(db, "rooms"), orderBy("updatedAt", "desc"));
      unsubscribeRooms = onSnapshot(roomsQuery, (snapshot) => {
        state.rooms = snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
        renderHub();
        if (activeRoomId) renderRoom();
      }, (error) => {
        roomsList.innerHTML = `<div class="empty-state glass">${escapeHTML(authMessage(error))}</div>`;
      });
    }

    function subscribeMessages(roomId) {
      if (unsubscribeMessages) unsubscribeMessages();
      state.messages = [];
      renderRoom();

      const messagesQuery = query(
        collection(db, "rooms", roomId, "messages"),
        orderBy("createdAt", "asc")
      );

      unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
        state.messages = snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
        renderRoom();
      }, (error) => {
        messagesList.innerHTML = `<div class="empty-state">${escapeHTML(authMessage(error))}</div>`;
      });
    }

    async function openRoom(roomId) {
      activeRoomId = roomId;
      subscribeMessages(roomId);
      showScreen(roomScreen);
      setTimeout(() => messageInput.focus(), 50);
    }

    async function ensureUserProfile(user, username = "") {
      const userRef = doc(db, "users", user.uid);
      const snapshot = await getDoc(userRef);
      const cleanName = username.trim();

      if (!snapshot.exists()) {
        const displayName = cleanName || user.displayName || user.email.split("@")[0];
        await setDoc(userRef, {
          uid: user.uid,
          email: user.email,
          username: displayName,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        if (user.displayName !== displayName) await updateProfile(user, { displayName });
        return displayName;
      }

      const profile = snapshot.data();
      if (cleanName && cleanName !== profile.username) {
        await setDoc(userRef, {
          username: cleanName,
          updatedAt: serverTimestamp()
        }, { merge: true });
        if (user.displayName !== cleanName) await updateProfile(user, { displayName: cleanName });
        return cleanName;
      }

      return profile.username || user.displayName || user.email.split("@")[0];
    }

    async function ensureSeedRooms() {
      const firstRoom = await getDocs(query(collection(db, "rooms"), limit(1)));
      if (!firstRoom.empty) return;

      for (const room of seedRooms) {
        const roomRef = await addDoc(collection(db, "rooms"), {
          name: room.name,
          members: room.members,
          messageCount: 1,
          lastMessageAuthor: room.author,
          lastMessageText: room.text,
          createdBy: "seed",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        await addDoc(collection(db, "rooms", roomRef.id, "messages"), {
          uid: "seed",
          author: room.author,
          text: room.text,
          createdAt: serverTimestamp()
        });
      }
    }

    async function createAccount() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const username = usernameInput.value.trim();

      if (username.length < 2) {
        loginError.textContent = "Le pseudo doit contenir au moins 2 caracteres.";
        return;
      }

      pendingUsername = username;
      setBusy(true, "Creation du compte...");
      loginError.textContent = "";

      try {
        const credential = await createUserWithEmailAndPassword(auth, email, password);
        await ensureUserProfile(credential.user, username);
      } catch (error) {
        loginError.textContent = authMessage(error);
      } finally {
        setBusy(false);
      }
    }

    async function signInAccount() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      pendingUsername = usernameInput.value.trim();
      setBusy(true, "Connexion...");
      loginError.textContent = "";

      try {
        const credential = await signInWithEmailAndPassword(auth, email, password);
        await ensureUserProfile(credential.user, usernameInput.value.trim());
      } catch (error) {
        loginError.textContent = authMessage(error);
      } finally {
        setBusy(false);
      }
    }

    async function logout() {
      activeRoomId = null;
      state.messages = [];
      if (unsubscribeRooms) unsubscribeRooms();
      if (unsubscribeMessages) unsubscribeMessages();
      unsubscribeRooms = null;
      unsubscribeMessages = null;
      await signOut(auth);
    }

    async function addMessage(text) {
      const room = getRoom(activeRoomId);
      if (!room || !state.user) return;

      await addDoc(collection(db, "rooms", room.id, "messages"), {
        uid: state.user.uid,
        author: state.username,
        text,
        createdAt: serverTimestamp()
      });

      await updateDoc(doc(db, "rooms", room.id), {
        lastMessageAuthor: state.username,
        lastMessageText: text,
        messageCount: increment(1),
        updatedAt: serverTimestamp()
      });
    }

    function authMessage(error) {
      const code = error?.code || "";
      const messages = {
        "auth/email-already-in-use": "Cet email est deja utilise.",
        "auth/invalid-email": "Email invalide.",
        "auth/invalid-credential": "Email ou mot de passe incorrect.",
        "auth/missing-password": "Entre un mot de passe.",
        "auth/weak-password": "Le mot de passe doit contenir au moins 6 caracteres.",
        "permission-denied": "Firestore refuse l'acces. Verifie les regles de securite Firebase."
      };
      return messages[code] || error?.message || "Une erreur est survenue.";
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      signInAccount();
    });

    signupBtn.addEventListener("click", createAccount);

    createRoomForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const roomName = roomNameInput.value.trim();

      if (roomName.length < 2) {
        roomError.textContent = "Choisis un nom de room plus lisible.";
        return;
      }

      roomError.textContent = "";
      const roomRef = await addDoc(collection(db, "rooms"), {
        name: roomName,
        members: Math.floor(5 + Math.random() * 18),
        messageCount: 1,
        lastMessageAuthor: "Zorii",
        lastMessageText: `La room ${roomName} vient d'ouvrir.`,
        createdBy: state.user.uid,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      await addDoc(collection(db, "rooms", roomRef.id, "messages"), {
        uid: "system",
        author: "Zorii",
        text: `La room ${roomName} vient d'ouvrir.`,
        createdAt: serverTimestamp()
      });

      roomNameInput.value = "";
      openRoom(roomRef.id);
    });

    messageForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;
      messageInput.value = "";
      try {
        await addMessage(text);
      } catch (error) {
        messageInput.value = text;
        messagesList.innerHTML = `<div class="empty-state">${escapeHTML(authMessage(error))}</div>`;
      }
    });

    backBtn.addEventListener("click", () => {
      activeRoomId = null;
      state.messages = [];
      if (unsubscribeMessages) unsubscribeMessages();
      unsubscribeMessages = null;
      renderHub();
      showScreen(hubScreen);
    });

    logoutBtn.addEventListener("click", logout);
    logoutBtnRoom.addEventListener("click", logout);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        state.user = null;
        state.username = "";
        state.rooms = [];
        state.messages = [];
        activeRoomId = null;
        emailInput.focus();
        showScreen(loginScreen);
        return;
      }

      state.user = user;
      setBusy(true, "Synchronisation...");
      try {
        state.username = await ensureUserProfile(user, pendingUsername);
        pendingUsername = "";
        currentUser.textContent = state.username;
        await ensureSeedRooms();
        subscribeRooms();
        showScreen(hubScreen);
      } catch (error) {
        loginError.textContent = authMessage(error);
        showScreen(loginScreen);
      } finally {
        setBusy(false);
      }
    });
  </script>
</body>
</html>
